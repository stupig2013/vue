<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Vue.js dev demo</title>
    <!-- Delete ".min" for console warnings in development -->
    <script src="../../dist/vue.js"></script>
  </head>
  <body>
    <!-- app -->
    <div id="app">
      <div v-if="typeof name === 'string'">{{name}}</div>
      <div v-else>{{name.a}}</div>
      
      <button @click="changeType">change type of name</button>
      <button @click="modifyName">name.a + 1</button>

      <my-component />
    </div>

    <script>
      Vue.component('my-component', {
        data: function () {
          return {
            count: 0
          }
        },
        template: '<div>22222:{{count}}</div>'
      });

      // start app
      new Vue({
        el: '#app',
        data: {
          name: 'name1',
        },

        computed: {
          // a() {
          //   return this.name
          // }
        },

        methods: {
          changeType() {
            this.name = {a: 1}
          },

          modifyName() {
            this.name.a += 1
          }
        }
      })
    </script>
  </body>
</html>
